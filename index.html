<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>XREZZKY AI - XREZZKY OFFICIALSTORE</title>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    :root {
      --purple: #a855f7;
      --blue: #3b82f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e2e8f0;
      /* Menggunakan min-height dinamis agar pas di browser mobile */
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    html {
      height: -webkit-fill-available;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 920px;
      /* Tinggi responsif: penuh di HP, berjarak sedikit di PC */
      height: 100vh; 
      height: -webkit-fill-available;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Tampilan khusus untuk PC / Tablet (Layar Lebar) */
    @media (min-width: 768px) {
      .chat-wrapper {
        height: 90vh;
        border-radius: 24px;
        border: 1px solid rgba(168, 85, 247, 0.25);
      }
    }

    .header {
      padding: 16px 20px;
      background: #0f172a;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0; /* Mencegah header gepeng */
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #0a0a0a;
      /* Scrollbar halus untuk mobile */
      -webkit-overflow-scrolling: touch; 
    }

    .message {
      max-width: 85%;
      padding: 12px 18px;
      border-radius: 20px;
      line-height: 1.5;
      font-size: 15px;
      position: relative;
      word-break: break-word;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot {
      align-self: flex-start;
      background: #1e2937;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .timestamp {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
      display: block;
    }

    .input-area {
      padding: 14px 20px;
      background: #0f172a;
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0; /* Mencegah input area tertekan hilang */
      /* Mengatasi ketukan keyboard virtual di iOS */
      padding-bottom: calc(14px + env(safe-area-inset-bottom)); 
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e2937;
      border-radius: 9999px;
      padding: 6px 10px;
      border: 1px solid #475569;
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 16px; /* 16px mencegah auto-zoom mengganggu di safari iOS */
      padding: 10px 6px;
    }

    button {
      width: 44px;
      height: 44px;
      background: linear-gradient(90deg, #a855f7, #6366f1);
      color: white;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    button:hover { transform: scale(1.05); }

    .copy-btn {
      margin-top: 8px;
      font-size: 12px;
      padding: 4px 10px;
      background: #334155;
      color: #cbd5e1;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .error {
      color: #ef4444;
      font-size: 13px;
      text-align: center;
      margin-top: 6px;
      display: none;
    }

    .char-count {
      text-align: right;
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="chat-wrapper">
    <div class="header">
      <i class="fas fa-robot" style="font-size:24px; color:var(--purple);"></i>
      <div>
        <strong>XREZZKY AI</strong><br>
        <small style="color:#64748b;">XREZZKY Official AI</small>
      </div>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Ketik pesanmu di sini..." maxlength="1000" autocomplete="off">
        <button onclick="sendMessage()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
      <div class="char-count" id="charCount">0 / 1000</div>
      <div class="error" id="errorMsg">Pesan tidak boleh kosong!</div>
    </div>
  </div>

  <script>
    const md = window.markdownit();

    function getCurrentTime() {
      const now = new Date();
      return now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();
      const errorMsg = document.getElementById("errorMsg");

      if (!message) {
        errorMsg.style.display = "block";
        setTimeout(() => errorMsg.style.display = "none", 2000);
        return;
      }

      errorMsg.style.display = "none";

      addMessage(message, "user");
      input.value = "";
      updateCharCount();

      const loadingElement = addMessage("XREZZ lagi mikir...", "bot");

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            message,
            sessionId: "xrezz-session-1" 
          })
        });

        const data = await res.json();
        
        if (loadingElement) loadingElement.remove();
        addMessage(data.reply || "Maaf, tidak ada respon.", "bot", true);

      } catch (err) {
        if (loadingElement) {
          loadingElement.innerHTML = `
            Maaf, koneksi bermasalah. Coba lagi ya.
            <span class="timestamp">${getCurrentTime()}</span>
          `;
        }
      }
    }

    function addMessage(text, sender, isBot = false) {
      const chatBox = document.getElementById("chatBox");
      const div = document.createElement("div");
      div.className = `message ${sender}`;

      const time = getCurrentTime();

      if (isBot) {
        div.innerHTML = `
          ${md.render(text)}
          <span class="timestamp">${time}</span>
          <button class="copy-btn" onclick="copyMessage(this)">Copy</button>
        `;
      } else {
        div.innerHTML = `
          ${text}
          <span class="timestamp">${time}</span>
        `;
      }

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      
      return div;
    }

    function copyMessage(btn) {
      const messageText = btn.parentElement.innerText.replace("Copy", "").replace(/\d{2}:\d{2}/, "").trim();
      navigator.clipboard.writeText(messageText);
      btn.textContent = "✓ Copied";
      setTimeout(() => btn.textContent = "Copy", 2000);
    }

    function updateCharCount() {
      const input = document.getElementById("userInput");
      const count = document.getElementById("charCount");
      count.textContent = `${input.value.length} / 1000`;
    }

    document.getElementById("userInput").addEventListener("input", updateCharCount);
    document.getElementById("userInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    window.onload = () => {
      setTimeout(() => {
        addMessage("Halo! 👋 Aku XREZZKY AI. Ada yang bisa aku bantu hari ini?", "bot");
      }, 600);
    };
  </script>
</body>
</html>
