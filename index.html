<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XREZZKY ASSISTANT - Official Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0b0f17;
            --bg-chat: #131a26;
            --bg-bubble-user: #2563eb;
            --bg-bubble-bot: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- HEADER CHAT --- */
        .chat-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: var(--bg-chat);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .brand-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background-color: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .brand-name h1 {
            font-size: 14px;
            font-weight: 600;
        }

        .brand-name p {
            font-size: 10px;
            color: #22c55e;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }
        .header-btn:active {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* --- AREA LAYAR CHAT UTAMA --- */
        .chat-container {
            position: absolute;
            top: 60px;
            bottom: 80px; 
            left: 0;
            right: 0;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message-row {
            display: flex;
            width: 100%;
        }
        .message-row.user-row { justify-content: flex-end; }
        .message-row.bot-row { justify-content: flex-start; }

        .bubble {
            max-width: 85%;
            padding: 12px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .user-row .bubble {
            background-color: var(--bg-bubble-user);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-row .bubble {
            background-color: var(--bg-bubble-bot);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .chat-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-bottom: 6px;
            display: block;
            object-fit: cover;
            cursor: pointer; /* Menandakan gambar bisa diklik */
            transition: opacity 0.2s;
        }
        .chat-img:active {
            opacity: 0.8;
        }

        /* --- PREVIEW GAMBAR (MELAYANG DI ATAS INPUT) --- */
        .preview-bar {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background-color: #1e293b;
            padding: 8px 12px;
            display: none;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            z-index: 9;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        }

        .preview-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preview-img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
        }

        .preview-text {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* --- BAR INPUT FIXED DI BAWAH --- */
        .chat-form {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background-color: var(--bg-chat);
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); 
            border-top: 1px solid var(--border-color);
            z-index: 10;
        }

        .modern-input-bar {
            display: flex;
            align-items: center;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2px 6px 2px 12px;
            gap: 6px;
            width: 100%;
            height: 44px;
        }

        .modern-input-bar input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            height: 100%;
        }

        .bar-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .send-btn-active {
            color: var(--text-main);
            background-color: var(--bg-bubble-user);
        }

        /* --- SIDEBAR RIWAYAT KANAN --- */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            z-index: 20;
            display: none;
        }

        .history-sidebar {
            position: fixed;
            top: 0;
            right: calc(-1 * var(--sidebar-width));
            width: var(--sidebar-width);
            height: 100%;
            background-color: var(--bg-chat);
            border-left: 1px solid var(--border-color);
            z-index: 21;
            display: flex;
            flex-direction: column;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h2 {
            font-size: 15px;
            font-weight: 600;
        }

        .new-chat-btn {
            background-color: var(--bg-bubble-user);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            width: calc(100% - 32px);
            margin: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .history-item.active-session {
            border-color: var(--bg-bubble-user);
            background-color: rgba(37, 99, 235, 0.05);
        }

        .history-item .title {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        .history-item .time {
            font-size: 10px;
            color: var(--text-muted);
        }

        .loading-bubble {
            color: var(--text-muted);
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- MODAL ZOOM FOTO (NEW) --- */
        .image-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-close-btn {
            position: absolute;
            top: calc(16px + env(safe-area-inset-top));
            right: 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .modal-img-content {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            object-fit: contain;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <div class="brand-info">
            <div class="avatar">X</div>
            <div class="brand-name">
                <h1>XREZZKY OFFICIAL STORE</h1>
                <p><i class="fas fa-circle" style="font-size: 7px;"></i> XREZZ AI Aktif</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="header-btn" id="openHistoryBtn" title="Riwayat Chat"><i class="fa-solid fa-clock-rotate-left"></i></button>
            <button class="header-btn" id="clearChatBtn" title="Hapus Sesi"><i class="fas fa-trash-can"></i></button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="preview-bar" id="previewBar">
        <div class="preview-container">
            <img src="" id="imgElementPreview" class="preview-img">
            <span class="preview-text">Gambar siap dikirim...</span>
        </div>
        <i class="fas fa-times" id="cancelImgBtn" style="color: #ef4444; cursor: pointer;"></i>
    </div>

    <form class="chat-form" id="chatForm">
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <div class="modern-input-bar">
            <button type="button" class="bar-btn" id="uploadBtn">
                <i class="fa-regular fa-image"></i>
            </button>
            <input type="text" id="userInput" placeholder="Tanya tentang XREZZKY STORE..." autocomplete="off">
            <button type="submit" class="bar-btn send-btn-active" id="sendBtn">
                <i class="fas fa-arrow-up"></i>
            </button>
        </div>
    </form>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="history-sidebar" id="historySidebar">
        <div class="sidebar-header">
            <h2>Riwayat Percakapan</h2>
            <button class="header-btn" id="closeHistoryBtn"><i class="fas fa-times"></i></button>
        </div>
        <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus"></i> Obrolan Baru</button>
        <div class="history-list" id="historyList"></div>
    </div>

    <div class="image-modal" id="imageModal">
        <button class="modal-close-btn" id="closeModalBtn"><i class="fas fa-times"></i></button>
        <img src="" id="modalImgTarget" class="modal-img-content">
    </div>

    <script>
        const BACKEND_API_URL = "https://xrezzky-assistant.vercel.app/api/chat";
        const SESSIONS_STORAGE_KEY = "xrezzky_sessions";
        const CURRENT_SESSION_KEY = "xrezzky_current_id";

        const chatContainer = document.getElementById("chatContainer");
        const chatForm = document.getElementById("chatForm");
        const userInput = document.getElementById("userInput");
        const fileInput = document.getElementById("fileInput");
        const uploadBtn = document.getElementById("uploadBtn");
        const previewBar = document.getElementById("previewBar");
        const imgElementPreview = document.getElementById("imgElementPreview");
        const cancelImgBtn = document.getElementById("cancelImgBtn");
        const clearChatBtn = document.getElementById("clearChatBtn");

        // Elemen Sidebar Riwayat
        const openHistoryBtn = document.getElementById("openHistoryBtn");
        const closeHistoryBtn = document.getElementById("closeHistoryBtn");
        const sidebarOverlay = document.getElementById("sidebarOverlay");
        const historySidebar = document.getElementById("historySidebar");
        const historyList = document.getElementById("historyList");
        const newChatBtn = document.getElementById("newChatBtn");

        // Elemen Modal Gambar (NEW)
        const imageModal = document.getElementById("imageModal");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const modalImgTarget = document.getElementById("modalImgTarget");

        let selectedBase64Image = null;
        let currentSessionId = localStorage.getItem(CURRENT_SESSION_KEY);

        // --- SISTEM MODAL BUKA FOTO (NEW) ---
        function openImageModal(src) {
            modalImgTarget.src = src;
            imageModal.style.display = "flex";
            setTimeout(() => {
                modalImgTarget.style.transform = "scale(1)";
            }, 50);
        }

        function closeImageModal() {
            modalImgTarget.style.transform = "scale(0.9)";
            setTimeout(() => {
                imageModal.style.display = "none";
                modalImgTarget.src = "";
            }, 200);
        }

        closeModalBtn.addEventListener("click", closeImageModal);
        imageModal.addEventListener("click", (e) => {
            // Jika yang diklik adalah background hitamnya (bukan gambarnya), maka tutup modal
            if(e.target !== modalImgTarget && e.target !== closeModalBtn) {
                closeImageModal();
            }
        });

        // --- MANAJEMEN SESI & SIDEBAR ---
        window.addEventListener("DOMContentLoaded", () => {
            if (!currentSessionId) {
                createNewSession();
            }
            loadCurrentSessionChat();
            renderSidebarList();
        });

        function createNewSession() {
            currentSessionId = "session_" + Date.now();
            localStorage.setItem(CURRENT_SESSION_KEY, currentSessionId);
            
            let sessions = JSON.parse(localStorage.getItem(SESSIONS_STORAGE_KEY)) || {};
            sessions[currentSessionId] = {
                title: "Obrolan Baru",
                timestamp: Date.now(),
                chats: []
            };
            localStorage.setItem(SESSIONS_STORAGE_KEY, JSON.stringify(sessions));
        }

        function loadCurrentSessionChat() {
            chatContainer.innerHTML = "";
            let sessions = JSON.parse(localStorage.getItem(SESSIONS_STORAGE_KEY)) || {};
            let currentData = sessions[currentSessionId];

            if (!currentData || currentData.chats.length === 0) {
                appendMessage("Halo! Selamat datang di XREZZKY OFFICIAL STORE. Ada yang bisa XREZZ AI bantu mengenai produk, aturan, atau layanan toko kami hari ini?", null, "bot");
            } else {
                currentData.chats.forEach(item => {
                    appendMessage(item.text, item.image, item.sender);
                });
            }
            setTimeout(() => { chatContainer.scrollTop = chatContainer.scrollHeight; }, 100);
        }

        function renderSidebarList() {
            historyList.innerHTML = "";
            let sessions = JSON.parse(localStorage.getItem(SESSIONS_STORAGE_KEY)) || {};
            let sortedKeys = Object.keys(sessions).sort((a,b) => sessions[b].timestamp - sessions[a].timestamp);

            if(sortedKeys.length === 0) {
                historyList.innerHTML = `<p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:20px;">Belum ada riwayat.</p>`;
                return;
            }

            sortedKeys.forEach(key => {
                const session = sessions[key];
                const item = document.createElement("div");
                item.classList.add("history-item");
                if (key === currentSessionId) item.classList.add("active-session");

                const dateStr = new Date(session.timestamp).toLocaleDateString('id-ID', {hour: '2-digit', minute:'2-digit'});

                item.innerHTML = `
                    <div class="title">${session.title}</div>
                    <div class="time">${dateStr}</div>
                `;

                item.addEventListener("click", () => {
                    currentSessionId = key;
                    localStorage.setItem(CURRENT_SESSION_KEY, currentSessionId);
                    loadCurrentSessionChat();
                    renderSidebarList();
                    closeSidebar();
                });

                historyList.appendChild(item);
            });
        }

        openHistoryBtn.addEventListener("click", () => {
            renderSidebarList();
            sidebarOverlay.style.display = "block";
            setTimeout(() => { historySidebar.style.right = "0"; }, 10);
        });

        function closeSidebar() {
            historySidebar.style.right = "calc(-1 * var(--sidebar-width))";
            setTimeout(() => { sidebarOverlay.style.display = "none"; }, 300);
        }

        closeHistoryBtn.addEventListener("click", closeSidebar);
        sidebarOverlay.addEventListener("click", closeSidebar);

        newChatBtn.addEventListener("click", () => {
            createNewSession();
            loadCurrentSessionChat();
            renderSidebarList();
            closeSidebar();
        });

        // --- SISTEM INPUT FOTO ---
        uploadBtn.addEventListener("click", () => fileInput.click());
        fileInput.addEventListener("change", function() {
            const file = this.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                selectedBase64Image = e.target.result;
                imgElementPreview.src = selectedBase64Image;
                previewBar.style.display = "flex";
            };
            reader.readAsDataURL(file);
        });

        cancelImgBtn.addEventListener("click", () => {
            selectedBase64Image = null;
            fileInput.value = "";
            previewBar.style.display = "none";
        });

        clearChatBtn.addEventListener("click", () => {
            if(confirm("Hapus obrolan aktif saat ini?")) {
                let sessions = JSON.parse(localStorage.getItem(SESSIONS_STORAGE_KEY)) || {};
                delete sessions[currentSessionId];
                localStorage.setItem(SESSIONS_STORAGE_KEY, JSON.stringify(sessions));
                
                const remainingKeys = Object.keys(sessions);
                if(remainingKeys.length > 0) {
                    currentSessionId = remainingKeys[0];
                    localStorage.setItem(CURRENT_SESSION_KEY, currentSessionId);
                } else {
                    createNewSession();
                }
                loadCurrentSessionChat();
                renderSidebarList();
            }
        });

        // --- PROSES SUBMIT CHAT ---
        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const textMessage = userInput.value.trim();
            if (!textMessage && !selectedBase64Image) return;

            const currentText = textMessage;
            const currentImage = selectedBase64Image;

            userInput.value = "";
            selectedBase64Image = null;
            fileInput.value = "";
            previewBar.style.display = "none";

            appendMessage(currentText, currentImage, "user");
            saveChatToSession(currentText, currentImage, "user");

            const loadingId = appendLoadingIndicator();

            try {
                const response = await fetch(BACKEND_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        user_message: currentText,
                        user_image: currentImage,
                        user_id: currentSessionId
                    })
                });

                if (!response.ok) throw new Error();
                const data = await response.json();
                removeLoadingIndicator(loadingId);

                if (data.response) {
                    appendMessage(data.response, null, "bot");
                    saveChatToSession(data.response, null, "bot");
                } else {
                    appendMessage("Maaf, sistem XREZZ AI sedang dikonfigurasi.", null, "bot");
                }
            } catch (error) {
                removeLoadingIndicator(loadingId);
                appendMessage("Gagal terhubung ke server XREZZKY. Periksa jaringan Anda.", null, "bot");
            }
        });

        function appendMessage(text, imageBase64, sender) {
            const row = document.createElement("div");
            row.classList.add("message-row", sender === "user" ? "user-row" : "bot-row");

            const bubble = document.createElement("div");
            bubble.classList.add("bubble");

            if (imageBase64) {
                const img = document.createElement("img");
                img.src = imageBase64;
                img.classList.add("chat-img");
                
                // PASANG EVENT KLIK AGAR BISA ZOOM FOTO (NEW)
                img.addEventListener("click", () => {
                    openImageModal(imageBase64);
                });
                
                bubble.appendChild(img);
            }
            if (text) {
                const textNode = document.createElement("span");
                textNode.textContent = text;
                bubble.appendChild(textNode);
            }
            row.appendChild(bubble);
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendLoadingIndicator() {
            const id = "load-" + Date.now();
            const row = document.createElement("div");
            row.id = id;
            row.classList.add("message-row", "bot-row");
            const bubble = document.createElement("div");
            bubble.classList.add("bubble", "loading-bubble");
            bubble.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Mengetik...`;
            row.appendChild(bubble);
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        function removeLoadingIndicator(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }

        function saveChatToSession(text, image, sender) {
            let sessions = JSON.parse(localStorage.getItem(SESSIONS_STORAGE_KEY)) || {};
            if (!sessions[currentSessionId]) return;

            if (sender === "user" && sessions[currentSessionId].chats.length === 0 && text) {
                sessions[currentSessionId].title = text; 
            }

            sessions[currentSessionId].chats.push({ text, image, sender });
            sessions[currentSessionId].timestamp = Date.now();
            
            localStorage.setItem(SESSIONS_STORAGE_KEY, JSON.stringify(sessions));
        }
    </script>
</body>
</html>
